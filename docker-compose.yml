services:
  postgres:
    image: postgres:16-alpine
    container_name: auto-x-to-wechat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: auto_x_to_wechat
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
